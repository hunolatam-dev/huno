name: Backup Supabase — HUNO

on:
  schedule:
    - cron: '0 6 * * *'   # 03:00 AM Chile (06:00 UTC) todos los días
  workflow_dispatch:        # ejecución manual desde GitHub Actions

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node backup.js

      - name: Guardar backup en repositorio
        run: |
          git config user.name "HUNO Backup Bot"
          git config user.email "backup@huno.cl"
          git add backups/
          git diff --staged --quiet || git commit -m "Backup $(date +'%Y-%m-%d %H:%M UTC')"
          git push
